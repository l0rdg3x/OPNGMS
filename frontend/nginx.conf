# Preserve the original scheme when an external reverse proxy (terminating TLS) sits in front of
# this container: honour the inbound X-Forwarded-Proto if present, otherwise fall back to the
# scheme of the connection to nginx. Keeps "https" intact through the proxy chain.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Real client IP behind a TRUSTED upstream proxy (optional). If an external reverse proxy sits in
    # front of this nginx, uncomment and set its address/CIDR so nginx recovers the true client IP from
    # the upstream's X-Forwarded-For. Without this, the immediate peer ($remote_addr) is used and any
    # inbound X-Forwarded-For is ignored — the safe default that prevents clients from spoofing their
    # IP to evade the login rate-limit/lockout.
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;
    # set_real_ip_from 10.0.0.0/8;   # <-- replace with your external proxy's address/CIDR

    # Security response headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # API reverse-proxy: same origin as the SPA, so the Secure/SameSite session cookie and the
    # CSRF header model work without CORS. `api` is the compose service name.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # REPLACE (not append) X-Forwarded-For with the resolved client address: $remote_addr is the
        # immediate peer, or — when real_ip is configured above — the true client recovered from the
        # trusted proxy chain. Appending the inbound header instead would let a client prepend a forged
        # IP that uvicorn (which trusts the leftmost entry) would then treat as the client, bypassing
        # the per-IP login lockout.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
