server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security response headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # API reverse-proxy: same origin as the SPA, so the Secure/SameSite session cookie and the
    # CSRF header model work without CORS. `api` is the compose service name.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
