# Build the production images and scan them for OS-level (and library) CVEs. Results in the Security tab.
name: Container Image Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"  # weekly, Monday 04:37 UTC

permissions:
  contents: read
  security-events: write
  packages: read  # read the Trivy vulnerability DB from ghcr.io as an authenticated pull

jobs:
  scan:
    name: Trivy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "opngms-${{ matrix.name }}:scan" "${{ matrix.context }}"

      # Authenticate to ghcr.io so the Trivy scanner image pulls without hitting the anonymous
      # GitHub Container Registry rate limit.
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Run Trivy from its official container image instead of aquasecurity/trivy-action. The
      # action's internal setup-trivy step downloads the Trivy binary from GitHub release assets,
      # which is rate-limited/flaky on public runners and was failing the job at install time
      # ("found version: 0.65.0 ... exit code 1"). The container already ships the binary; the
      # vulnerability DB is pulled from the GCR mirror (Trivy's default), so no ghcr DB rate limit.
      # --exit-code 0 keeps findings non-fatal — results land in the Security tab via the SARIF upload.
      - name: Trivy scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/out" \
            ghcr.io/aquasecurity/trivy:0.65.0 image \
            --format sarif --output "/out/trivy-${{ matrix.name }}.sarif" \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 \
            --skip-version-check \
            "opngms-${{ matrix.name }}:scan"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-${{ matrix.name }}.sarif"
          category: "trivy-${{ matrix.name }}"
