# Build the production images and scan them for OS-level (and library) CVEs. Results in the Security tab.
name: Container Image Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"  # weekly, Monday 04:37 UTC

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "opngms-${{ matrix.name }}:scan" "${{ matrix.context }}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "opngms-${{ matrix.name }}:scan"
          format: sarif
          output: "trivy-${{ matrix.name }}.sarif"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.name }}.sarif"
          category: "trivy-${{ matrix.name }}"
