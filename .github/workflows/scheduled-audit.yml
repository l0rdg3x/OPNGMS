# Weekly dependency audit so new CVEs in already-pinned deps surface even without a code change.
name: Scheduled Dependency Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install audit tooling + backend deps
        run: pip install -e backend[dev] pip-audit

      - name: Install frontend deps (for npm audit lockfile resolution)
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Run dependency audit
        run: bash scripts/security_audit.sh
