name: Release

# When a version tag (vX.Y.Z) is pushed, publish a GitHub Release whose body is the annotated tag's
# message — i.e. that version's changelog. Runs alongside publish-images.yml (which builds the GHCR
# images on the same tag). Keep the annotated tag message rich: `git tag -a vX.Y.Z -m "..."`.
on:
  push:
    tags: ["v*.*.*"]

# Needs write to create the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release from the annotated tag
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # fetch tags so gh can read the annotated tag's message

      - name: Create the GitHub Release (idempotent)
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          # --notes-from-tag uses the annotated tag message (the changelog) as the release body.
          gh release create "$TAG" --verify-tag --title "$TAG" --notes-from-tag
