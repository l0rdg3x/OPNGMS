# Block pull requests that introduce dependencies with known (high+) vulnerabilities.
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5  # Node 24 runtime (v4 ran on the deprecated Node 20)
        with:
          fail-on-severity: high
