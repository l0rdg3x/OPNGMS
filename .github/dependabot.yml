# Automated dependency-update PRs (complements pip-audit / npm audit). Weekly, grouped so
# each ecosystem opens a SINGLE combined PR (fewer PRs => fewer notification emails),
# capped to limit open PRs.
version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    groups:
      backend:
        patterns: ["*"]
    ignore:
      # arq pins redis[hiredis]<6, so redis >= 6 is unusable until arq raises its cap.
      # (Dependabot proposed redis 8 in PR #22, which failed to resolve — keep redis 5.x.)
      - dependency-name: "redis"
        versions: [">=6"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    groups:
      docker-backend:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    groups:
      docker-frontend:
        patterns: ["*"]
