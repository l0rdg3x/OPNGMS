# Automated dependency-update PRs (complements pip-audit / npm audit). Weekly.
# Grouping strategy: bundle only low-risk MINOR + PATCH bumps into one combined PR per
# ecosystem (fewer PRs => fewer notification emails). For npm / github-actions / docker,
# MAJOR updates still come as their own individual PRs (full granularity to evaluate them).
version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    groups:
      backend-minor:
        update-types: [minor, patch]
    ignore:
      # Backend Python deps are tangled with transitive upper-bound caps that make a
      # standalone MAJOR bump unresolvable until the capping library catches up, so it only
      # yields a red PR. Known caps: arq->redis<6 (closed PR #22), fastapi/starlette->
      # httpx<1.0/<0.29, pytest-asyncio->pytest<10, py-serializable->defusedxml<0.8.
      # Major upgrades here are therefore done deliberately/manually (coordinating the capping
      # libs); minor+patch still flow (grouped above). Security fixes are unaffected:
      # Dependabot *security* updates and the CI pip-audit step still apply regardless.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    groups:
      frontend-minor:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions-minor:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    groups:
      docker-backend-minor:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    groups:
      docker-frontend-minor:
        update-types: [minor, patch]
