name: Feature request
description: Suggest an idea or improvement for OPNGMS
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you are trying to solve, not
        only the solution — it helps us find the best fit for OPNGMS.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What is the use case?
      placeholder: "As an MSP operator, I want … so that …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of OPNGMS would this affect?
      options:
        - Frontend / UI
        - API / backend
        - Worker (polling, reports, ingest)
        - Config editor / templates / catalogs
        - Reporting / PDF / email delivery
        - Log lake (syslog / OpenSearch)
        - Deployment / Docker / TLS
        - Internationalization (new language / translation)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or anything else that helps explain the request. Redact any customer data.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched the existing issues and discussions and this is not a duplicate.
          required: true
