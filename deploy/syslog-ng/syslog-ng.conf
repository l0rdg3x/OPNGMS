@version: 4.5
@include "scl.conf"

# =============================================================================
# OPNGMS syslog-ng receiver — Phase 1 log lake
# =============================================================================
# Receives device logs over mTLS (port 6514, syslog protocol / RFC 5424).
# Each device presents a per-device client certificate (CN = device_id,
# O = tenant_id) issued by the OPNGMS CA (via syslog-bootstrap).
# Logs are forwarded to OpenSearch over plain HTTP (security plugin disabled;
# OpenSearch is INTERNAL-ONLY, not published — the trust boundary is this mTLS hop).
#
# Disk-buffer absorbs log bursts during OpenSearch downtime; no logs are dropped
# for transient outages up to the buffer size (256 MiB).
# =============================================================================

# ---------------------------------------------------------------------------
# Global options
# ---------------------------------------------------------------------------
options {
    flush_lines(10);
    log_fifo_size(10000);
    keep_hostname(yes);
    use_dns(no);
    use_fqdn(no);
    chain_hostnames(no);
    normalize_hostnames(no);
    time_reopen(10);
    # Pad stats interval; high-volume sites can lower this.
    stats_freq(600);
};

# ---------------------------------------------------------------------------
# Source: mTLS syslog receiver (RFC 5424)
# ---------------------------------------------------------------------------
# Client certificates MUST be signed by the CA in /certs/CA.pem.
# Only CA-signed client certs are accepted (peer-verify required-trusted).
# The server cert + key are the receiver's own TLS identity.
# ---------------------------------------------------------------------------
source s_tls {
    network(
        transport("tls")
        port(6514)
        flags(syslog-protocol)
        tls(
            ca-file("/certs/CA.pem")
            cert-file("/certs/server.pem")
            key-file("/certs/server.key")
            peer-verify(required-trusted)
        )
    );
};

# ---------------------------------------------------------------------------
# Extract tenant_id from the client certificate Subject O= RDN
# ---------------------------------------------------------------------------
#
# RUNTIME VERIFICATION REQUIRED — syslog-ng renders ${.tls.x509_subject}
# differently across builds and OpenSSL versions. Before going to production:
#
#   1. Send a test log from a real device.
#   2. Inspect the raw macro:
#        destination d_debug { file("/tmp/tls-debug.log" template("SUBJECT=${.tls.x509_subject} CN=${.tls.x509_cn}\n")); };
#        log { source(s_tls); destination(d_debug); };
#   3. Two common formats:
#        a) OpenSSL RFC 4514 (comma-delimited):  "CN=device-uuid,O=tenant-uuid"
#        b) OpenSSL legacy slash-delimited:      "/O=tenant-uuid/CN=device-uuid"
#   Goal: tenant_id = the O value; device_id = ${.tls.x509_cn}  (always reliable).
#
# The regexp below targets format (a) "CN=...,O=<tenant>" first; see the
# ALTERNATIVE for format (b). If your build emits a third format, adjust the
# pattern accordingly. Both regexps are here; only one should be active.
# ---------------------------------------------------------------------------

# FORMAT (a): "CN=<id>,O=<tenant>" or "O=<tenant>,CN=<id>"  (RFC 4514, comma-separated)
parser p_extract_tenant {
    regexp-parser(
        patterns(
            # Matches O=<value> anywhere in the subject string (both orderings).
            "(?:^|,)O=(?P<tenant_id>[^,]+)"
        )
        template("${.tls.x509_subject}")
        flags(global-search)
    );
};

# ALTERNATIVE — FORMAT (b): "/O=<tenant>/CN=<id>"  (legacy slash-delimited)
# Uncomment and replace p_extract_tenant above if your build uses this format.
#
# parser p_extract_tenant {
#     regexp-parser(
#         patterns("/O=(?P<tenant_id>[^/]+)")
#         template("${.tls.x509_subject}")
#     );
# };

# NOTE: If regexp-parser is not available on your syslog-ng build, use a
# set() rewrite with subst() instead:
#
# rewrite r_extract_tenant {
#     subst("(?:^|,)O=([^,/]+)(?:,|/|$)", "${1}", value("tenant_id")
#           template("${.tls.x509_subject}") type("pcre") flags("global-search, store-matches"));
# };
# (and replace parser(p_extract_tenant) with rewrite(r_extract_tenant) in the log path)

# ---------------------------------------------------------------------------
# Parser: Suricata EVE JSON  (Suricata-format syslog messages)
# ---------------------------------------------------------------------------
# Suricata's syslog output wraps an EVE JSON blob in the MESSAGE field.
# This parser lifts the JSON fields under the ".eve." prefix.
# Non-JSON messages (filterlog, dhcpd, etc.) pass through unchanged — the
# json-parser() silently skips them when the MESSAGE is not valid JSON
# (syslog-ng 4.x default: on-error(drop-message) → change to on-error(fallback-to-string)
# if you want EVE parse errors to be forwarded raw instead of dropped).
# ---------------------------------------------------------------------------
parser p_eve {
    json-parser(
        prefix(".eve.")
        template("${MESSAGE}")
        flags(no-multi-line)
        on-error(fallback-to-string)
    );
};

# ---------------------------------------------------------------------------
# Destination: OpenSearch  (plain HTTP, no auth — internal network only)
# ---------------------------------------------------------------------------
# Index pattern: opngms-logs-YYYY.MM.DD  (daily indices, simplifies retention)
# The OPENSEARCH_URL env var is interpolated at runtime by the container; it
# defaults to http://opensearch:9200 (set in docker-compose.logs.yml).
#
# disk-buffer: absorbs logs during OpenSearch restarts / rolling upgrades.
# 256 MiB disk buffer + reliable(yes) ensures at-least-once delivery.
# Adjust disk-buf-size for your expected burst volume.
# ---------------------------------------------------------------------------
destination d_opensearch {
    http(
        url("${OPENSEARCH_URL}/opngms-logs-${YEAR}.${MONTH}.${DAY}/_doc")
        method("POST")
        headers("Content-Type: application/json")
        body(
            "$(format-json
                @timestamp=\"${ISODATE}\"
                tenant_id=\"${tenant_id}\"
                device_id=\"${.tls.x509_cn}\"
                host=\"${HOST}\"
                program=\"${PROGRAM}\"
                pid=\"${PID}\"
                facility=\"${FACILITY}\"
                severity=\"${LEVEL}\"
                message=\"${MESSAGE}\"
                --key-delimiter .
                --scope dot-nv-pairs,nv-pairs,rfc5424,all-nv-pairs
                --exclude HOST
                --exclude PROGRAM
                --exclude PID
                --exclude FACILITY
                --exclude LEVEL
                --exclude MESSAGE
                --exclude DATE
                --exclude ISODATE
                --prefix .
            )"
        )
        disk-buffer(
            disk-buf-size(268435456)
            reliable(yes)
            dir("/var/lib/syslog-ng")
        )
        workers(4)
        batch-lines(50)
        batch-timeout(5000)
        timeout(10)
        response-action(200, success)
        response-action(201, success)
        response-action(400, drop)
        response-action(503, retry)
    );
};

# ---------------------------------------------------------------------------
# Log path
# ---------------------------------------------------------------------------
log {
    source(s_tls);
    parser(p_extract_tenant);
    parser(p_eve);
    destination(d_opensearch);
    flags(flow-control);
};
