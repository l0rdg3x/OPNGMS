@version: 4.5
@include "scl.conf"

# =============================================================================
# OPNGMS syslog-ng receiver — Phase 1 log lake
# =============================================================================
# Receives device logs over mTLS (port 6514, syslog protocol / RFC 5424).
# Each device presents a per-device client certificate (CN = device_id,
# O = tenant_id) issued by the OPNGMS CA (via syslog-bootstrap).
# Logs are forwarded to OpenSearch over plain HTTP (security plugin disabled;
# OpenSearch is INTERNAL-ONLY, not published — the trust boundary is this mTLS hop).
#
# Disk-buffer absorbs log bursts during OpenSearch downtime; no logs are dropped
# for transient outages up to the buffer size (256 MiB).
# =============================================================================

# ---------------------------------------------------------------------------
# Global options
# ---------------------------------------------------------------------------
options {
    flush_lines(10);
    log_fifo_size(10000);
    keep_hostname(yes);
    use_dns(no);
    use_fqdn(no);
    chain_hostnames(no);
    normalize_hostnames(no);
    time_reopen(10);
    # Pad the stats interval; high-volume sites can lower this.
    # (syslog-ng 4.x: stats(freq(N)) inside options(), not the obsolete stats_freq().)
    stats(freq(600));
    # Non-JSON messages (filterlog, dhcpd, …) must pass through the EVE json-parser raw,
    # not be dropped. Set globally — json-parser() takes no on-error() keyword in this build.
    on-error("fallback-to-string");
};

# ---------------------------------------------------------------------------
# Source: mTLS syslog receiver (RFC 5424)
# ---------------------------------------------------------------------------
# Client certificates MUST be signed by the CA in /certs/CA.pem.
# Only CA-signed client certs are accepted (peer-verify required-trusted).
# The server cert + key are the receiver's own TLS identity.
# ---------------------------------------------------------------------------
source s_tls {
    network(
        transport("tls")
        port(6514)
        flags(syslog-protocol)
        tls(
            ca-file("/certs/CA.pem")
            cert-file("/certs/server.pem")
            key-file("/certs/server.key")
            peer-verify(required-trusted)
        )
    );
};

# ---------------------------------------------------------------------------
# Extract tenant_id from the client certificate Subject O= RDN
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Verified live (2026-06-12) against syslog-ng 4.5.0 + OpenSSL 3: this build does
# NOT populate the full-subject macro ${.tls.x509_subject} (it renders empty), but
# it DOES expose the individual RDN macros ${.tls.x509_cn} and ${.tls.x509_o}.
# So we read the per-RDN macros directly — no fragile subject regexp:
#   tenant_id = ${.tls.x509_o}   (the cert's O = tenant id)
#   device_id = ${.tls.x509_cn}  (the cert's CN = device id; used in the destination)
# Both come from the peer certificate, which is CA-verified (peer-verify required-trusted),
# so they cannot be spoofed by the client.
# ---------------------------------------------------------------------------
rewrite r_set_tenant {
    set("${.tls.x509_o}", value("tenant_id"));
};

# ---------------------------------------------------------------------------
# Parser: Suricata EVE JSON  (Suricata-format syslog messages)
# ---------------------------------------------------------------------------
# Suricata's syslog output wraps an EVE JSON blob in the MESSAGE field.
# This parser lifts the JSON fields under the ".eve." prefix.
# Non-JSON messages (filterlog, dhcpd, etc.) pass through unchanged — the
# json-parser() silently skips them when the MESSAGE is not valid JSON
# (syslog-ng 4.x default: on-error(drop-message) → change to on-error(fallback-to-string)
# if you want EVE parse errors to be forwarded raw instead of dropped).
# ---------------------------------------------------------------------------
parser p_eve {
    json-parser(
        prefix(".eve.")
        template("${MESSAGE}")
    );
};

# ---------------------------------------------------------------------------
# Filter: drop logs without a resolved tenant_id
# ---------------------------------------------------------------------------
# If the Subject O= RDN did not parse (empty/unparsed tenant_id), the document
# would land in OpenSearch un-attributable to a tenant. Refuse to index it.
# ---------------------------------------------------------------------------
filter f_has_tenant { "${tenant_id}" ne ""; };

# ---------------------------------------------------------------------------
# Destination: OpenSearch  (plain HTTP, no auth — internal network only)
# ---------------------------------------------------------------------------
# Index pattern: opngms-logs-YYYY.MM.DD  (daily indices, simplifies retention)
# The OPENSEARCH_URL env var is interpolated at runtime by the container; it
# defaults to http://opensearch:9200 (set in docker-compose.logs.yml).
#
# disk-buffer: absorbs logs during OpenSearch restarts / rolling upgrades.
# 256 MiB disk buffer + reliable(yes) ensures at-least-once delivery.
# Adjust disk-buf-size for your expected burst volume.
# ---------------------------------------------------------------------------
destination d_opensearch {
    http(
        url("`OPENSEARCH_URL`/opngms-logs-${YEAR}.${MONTH}.${DAY}/_doc")
        method("POST")
        headers("Content-Type: application/json")
        body(
            "$(format-json
                @timestamp=\"${ISODATE}\"
                tenant_id=\"${tenant_id}\"
                device_id=\"${.tls.x509_cn}\"
                host=\"${HOST}\"
                program=\"${PROGRAM}\"
                pid=\"${PID}\"
                facility=\"${FACILITY}\"
                severity=\"${LEVEL}\"
                message=\"${MESSAGE}\"
                --key-delimiter .
                --scope dot-nv-pairs,rfc5424
                --exclude HOST
                --exclude PROGRAM
                --exclude PID
                --exclude FACILITY
                --exclude LEVEL
                --exclude MESSAGE
                --exclude DATE
                --exclude ISODATE
                --exclude .tls.*
            )"
        )
        disk-buffer(
            disk-buf-size(268435456)
            reliable(yes)
            dir("/var/lib/syslog-ng")
        )
        workers(4)
        # Required when the url() contains templates (daily index) with batching + multiple workers:
        # partition batches by the same date macros used in the url so each worker stays consistent.
        worker-partition-key("${YEAR}${MONTH}${DAY}")
        batch-lines(50)
        batch-timeout(5000)
        timeout(10)
        response-action(
            200 => success
            201 => success
            400 => drop
            503 => retry
        )
    );
};

# ---------------------------------------------------------------------------
# Log path
# ---------------------------------------------------------------------------
log {
    source(s_tls);
    rewrite(r_set_tenant);
    # NOTE: p_eve (json-parser) is intentionally NOT wired here. Verified live (2026-06-12) that this
    # syslog-ng build's json-parser DROPS any non-JSON message on a parse error — and most logs
    # (filterlog, dhcpd, system) are not JSON — which would silently lose them. Suricata EVE lines are
    # still indexed verbatim in `message`. Exploding EVE sub-fields (json-parser gated behind a
    # `message`-starts-with-`{` test) is a tracked follow-up.
    filter(f_has_tenant);
    destination(d_opensearch);
    flags(flow-control);
};
