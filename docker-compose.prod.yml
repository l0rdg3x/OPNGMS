# OPNGMS — production stack. Bring up with:
#   cp .env.example .env   # then edit the secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Services: db (TimescaleDB) + redis, a one-shot `migrate` (alembic, as the owner), the `api`
# (uvicorn, as the non-superuser opngms_app -> RLS enforced), the `worker` (arq, as the owner),
# and `frontend` (nginx serving the SPA + reverse-proxying /api to the api, single origin).

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-UTC}                       # container/log timezone (data is stored UTC; see .env.example)
    volumes:
      - opngms_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # One-shot: apply migrations as the owner (creates the schema + the opngms_app role + RLS + grants).
  # alembic env.py reads ALEMBIC_DATABASE_URL first — point it at the owner URL (opngms_app does not
  # exist until 0003 runs, so migrations MUST connect as the owner).
  migrate:
    image: opngms-backend:latest
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      ALEMBIC_DATABASE_URL: ${ADMIN_DATABASE_URL}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: ./backend
    image: opngms-backend:latest
    # --proxy-headers + --forwarded-allow-ips makes uvicorn honour X-Forwarded-For/-Proto so the
    # app sees the real client IP and original scheme behind a reverse proxy (nginx here, plus any
    # external proxy in front of it). "*" trusts all upstreams to set those headers, which is safe
    # because this service's port 8000 is NOT published to the host — only the compose network
    # (the trusted nginx) can reach it. If you ever expose the API port directly, change "*" here to
    # the proxy's address/CIDR.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}                       # report-schedule HOURS are UTC by design; this only affects logs/system time
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    image: opngms-backend:latest
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}                       # the report cron fires on UTC schedule hours; TZ only affects worker logs
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # SPA + /api reverse-proxy (nginx). This BASE file serves plain HTTP and is bound to LOCALHOST only,
  # so it is NOT internet-facing by default — meant to sit behind a TLS-terminating reverse proxy / LB
  # (Cloudflare, an external nginx/Caddy/Traefik, a cloud ALB, a k8s ingress). The proxy must forward
  # `X-Forwarded-Proto: https` so the app issues Secure cookies (nginx preserves it end-to-end).
  # For self-contained HTTPS instead, add ONE override (pick exactly one):
  #   built-in cert : docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml     up -d
  #   auto (Caddy)  : docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml   up -d
  #   auto (Traefik): docker compose -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d
  frontend:
    build: ./frontend
    image: opngms-frontend:latest
    environment:
      TLS_MODE: ${TLS_MODE:-off}            # overrides flip this to `builtin`; base = terminate TLS upstream
      SERVER_NAME: ${SERVER_NAME:-_}        # your domain (e.g. opngms.example.com)
      TZ: ${TZ:-UTC}                        # nginx log timezone
    ports:
      # Localhost-only by default. Point your upstream proxy at 127.0.0.1:${FRONTEND_HTTP_PORT:-8080}.
      # Set FRONTEND_BIND=0.0.0.0 ONLY if something else terminates TLS in front of this port.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_HTTP_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  opngms_pg:
