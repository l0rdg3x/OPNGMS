# Opt-in log lake (Phase 1). Bring up with:
#   docker compose -f docker-compose.prod.yml -f docker-compose.logs.yml up -d
# OpenSearch runs plain-HTTP, security disabled, internal-network only (NOT published).
# The trust boundary is the mTLS device->syslog-ng hop (port 6514). No search UI yet (Phase 2).
#
# Retention: syslog-ng writes per-tenant daily indices (opngms-logs-<tenant_id>-DATE) and the OPNGMS
# worker's daily purge_log_lake job owns retention — it deletes each tenant's over-age indices at that
# tenant's effective retention (global default + per-tenant override). There is no global ISM policy
# (syslog-bootstrap removes any legacy one); the only OpenSearch config applied is the index template.

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: ${TZ:-UTC}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opngms_os:/usr/share/opensearch/data
    restart: unless-stopped

  syslog-bootstrap:
    image: ghcr.io/l0rdg3x/opngms-backend:${OPNGMS_VERSION:-latest}
    command: ["python", "-m", "app.cli", "syslog-bootstrap", "--cert-dir", "/certs"]
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - opngms_syslog_certs:/certs
    depends_on:
      opensearch:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: "no"

  syslog-ng:
    image: balabit/syslog-ng:4.5.0
    # entrypoint.sh runs syslog-ng + a CRL reload-watcher (syslog-ng caches the CRL at init, so an
    # updated /certs/crl/<hash>.r0 needs a `syslog-ng-ctl reload` to take effect).
    command: ["/entrypoint.sh"]
    environment:
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      TZ: ${TZ:-UTC}
    ports:
      - "${SYSLOG_TLS_PORT:-6514}:6514"
    volumes:
      - ./deploy/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ./deploy/syslog-ng/entrypoint.sh:/entrypoint.sh:ro
      - opngms_syslog_certs:/certs:ro
      - opngms_syslog_buffer:/var/lib/syslog-ng
    depends_on:
      syslog-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # Merge onto the base prod worker: give it the cert volume so the daily/on-revoke CRL refresh cron
  # can write /certs/crl/<hash>.r0 (the worker reads the revoked-cert ledger owner-side).
  worker:
    volumes:
      - opngms_syslog_certs:/certs

volumes:
  opngms_os:
  opngms_syslog_certs:
  opngms_syslog_buffer:
