# Override: SELF-CONTAINED HTTPS with AUTOMATIC certificates via Caddy (Let's Encrypt / ACME).
# Caddy sits in front, obtains + auto-renews a real cert for ${DOMAIN}, and reverse-proxies to the
# frontend (which stays plain HTTP on the compose network). Zero cert files.
#
#   1) point ${DOMAIN}'s public DNS A/AAAA record at this host; ports 80 + 443 must be reachable
#   2) set DOMAIN=your.domain and ACME_EMAIL=you@example.com in .env
#   3) docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d --build
#
# Pick exactly ONE of the TLS overrides (this, .tls.yml, or .traefik.yml). Requires Docker
# Compose v2.24.4+ for the `!override` tag.
services:
  frontend:
    ports: !override []          # not host-published; Caddy fronts it on the compose network

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your public hostname for automatic HTTPS}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
