# gitleaks configuration for OPNGMS.
#
# We extend gitleaks' full default ruleset (real secrets are caught everywhere, in every file and
# every path) and add ONE narrow allowlist that suppresses only two specific, harmless illustrative
# strings that the entropy-based `generic-api-key` heuristic false-positives on:
#
#   * "SQLAlchemy/Alembic" — appears in the tech-stack prose of the design docs; the slash + mixed
#     case makes the heuristic treat it as a key.
#   * the local *test* database DSN `postgresql+asyncpg://opngms:opngms@localhost/...` — a throwaway
#     local credential embedded in plan/spec snippets and all over the test suite.
#
# The `regexes` suppression is scoped by the secret string (NOT by path): no source file is exempted
# for those, so a real `ghp_…`, AWS key, private key, etc. is still flagged even inside the design docs.
#
# The single `paths` exemption below covers ONLY the frontend i18n dictionaries
# (`frontend/src/i18n/*.ts`). These are pure UI display-string tables shipped to every browser — they
# are public by construction and structurally cannot hold a real secret. The entropy-based
# `generic-api-key` heuristic otherwise misfires on natural-language translations of labels whose KEY
# names contain trigger words (e.g. `passwordToggle`, `apiSecret`, `secretLabel`) — a recurring,
# language-dependent false positive. Exempting these public string tables loses no real coverage.
#
# Real secrets never live in the repo (they come from the environment / files outside the tree).
# GitHub secret scanning runs alongside this as defence in depth.

title = "OPNGMS gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Suppress harmless generic-api-key misfires: two illustrative strings (by match) + the public frontend i18n string tables (by path)."
regexTarget = "match"
regexes = [
  '''SQLAlchemy/Alembic''',
  '''postgresql\+asyncpg://opngms:opngms@localhost''',
]
paths = [
  '''frontend/src/i18n/.*\.ts$''',
]
