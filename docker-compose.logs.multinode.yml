# Opt-in log lake — MULTI-NODE OpenSearch (3 nodes, HA). Use INSTEAD of docker-compose.logs.yml:
#   docker compose -f docker-compose.prod.yml -f docker-compose.logs.multinode.yml up -d
# Verify HA at a staging bring-up (node loss -> index stays green). Internal-only, no published port.
#
# Retention: per-tenant daily indices (opngms-logs-<tenant_id>-DATE); the OPNGMS worker's daily
# purge_log_lake job owns retention at each tenant's effective age. No global ISM policy
# (syslog-bootstrap removes any legacy one) — only the index template is applied to OpenSearch.

x-os-common: &os-common
  image: opensearchproject/opensearch:2.17.1
  environment: &os-env
    cluster.name: opngms-logs
    bootstrap.memory_lock: "true"
    DISABLE_SECURITY_PLUGIN: "true"
    OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    TZ: ${TZ:-UTC}
    discovery.seed_hosts: opensearch-n1,opensearch-n2,opensearch-n3
    cluster.initial_cluster_manager_nodes: opensearch-n1,opensearch-n2,opensearch-n3
  ulimits:
    memlock: { soft: -1, hard: -1 }
  restart: unless-stopped

services:
  opensearch-n1:
    <<: *os-common
    environment:
      <<: *os-env
      node.name: opensearch-n1
    volumes:
      - opngms_os_n1:/usr/share/opensearch/data

  opensearch-n2:
    <<: *os-common
    environment:
      <<: *os-env
      node.name: opensearch-n2
    volumes:
      - opngms_os_n2:/usr/share/opensearch/data

  opensearch-n3:
    <<: *os-common
    environment:
      <<: *os-env
      node.name: opensearch-n3
    volumes:
      - opngms_os_n3:/usr/share/opensearch/data

  syslog-bootstrap:
    image: ghcr.io/l0rdg3x/opngms-backend:${OPNGMS_VERSION:-latest}
    command: ["python", "-m", "app.cli", "syslog-bootstrap", "--cert-dir", "/certs"]
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch-n1:9200}
    volumes:
      - opngms_syslog_certs:/certs
    depends_on:
      opensearch-n1:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: "no"

  syslog-ng:
    image: balabit/syslog-ng:4.5.0
    # entrypoint.sh runs syslog-ng + a CRL reload-watcher (syslog-ng caches the CRL at init, so an
    # updated /certs/crl/<hash>.r0 needs a `syslog-ng-ctl reload` to take effect).
    # NB: override `entrypoint` (not just `command`) — the base image's ENTRYPOINT is
    # `/usr/sbin/syslog-ng -F`, so a bare `command:` would be appended to it, not replace it.
    entrypoint: ["/entrypoint.sh"]
    environment:
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch-n1:9200}
      TZ: ${TZ:-UTC}
    ports:
      - "${SYSLOG_TLS_PORT:-6514}:6514"
    volumes:
      - ./deploy/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ./deploy/syslog-ng/entrypoint.sh:/entrypoint.sh:ro
      - opngms_syslog_certs:/certs:ro
      - opngms_syslog_buffer:/var/lib/syslog-ng
    depends_on:
      syslog-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # Merge onto the base prod worker: give it the cert volume so the daily/on-revoke CRL refresh cron
  # can write /certs/crl/<hash>.r0 (the worker reads the revoked-cert ledger owner-side).
  worker:
    volumes:
      - opngms_syslog_certs:/certs

volumes:
  opngms_os_n1:
  opngms_os_n2:
  opngms_os_n3:
  opngms_syslog_certs:
  opngms_syslog_buffer:
